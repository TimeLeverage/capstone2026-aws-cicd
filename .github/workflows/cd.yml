name: CD Pipeline - AWS EC2 Deploy

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
  BACKEND_REPO: capstone2026/yj-backend
  FRONTEND_REPO: capstone2026/yj-frontend

jobs:
  # ── Job 1: 백엔드 빌드 & ECR Push ──────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Spring Boot JAR 빌드
        run: cd backend && ./mvnw clean package -DskipTests

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Backend Docker 빌드 & ECR Push
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }} ./backend
          docker tag  $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }} $ECR_REGISTRY/$BACKEND_REPO:latest
          docker push $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$BACKEND_REPO:latest

  # ── Job 2: 프론트엔드 빌드 & ECR Push ──────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Frontend Docker 빌드 & ECR Push
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }} ./frontend
          docker tag  $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }} $ECR_REGISTRY/$FRONTEND_REPO:latest
          docker push $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$FRONTEND_REPO:latest

  # ── Job 3: EC2 배포 ─────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]  # 두 빌드 완료 후 실행
    steps:
      - uses: actions/checkout@v4

      - name: EC2에 SSH 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # AWS 로그인 (EC2에 IAM 역할 필요)
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
            
            # 최신 이미지 pull & 재시작
            cd ~/capstone2026
            docker-compose pull
            docker-compose up -d
            
            # 사용하지 않는 이미지 정리
            docker image prune -f
